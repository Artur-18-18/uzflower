<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title data-i18n="auth.forgot_password_title">Восстановление пароля - UzFlower</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <script src="/static/js/i18n.js"></script>
  <style>
    .forgot-body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fdf2f8 0%, #fce7f3 100%);
      padding: 20px;
    }

    .forgot-container {
      max-width: 450px;
      width: 100%;
    }

    .forgot-box {
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      padding: 40px;
    }

    .forgot-box h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 28px;
    }

    .forgot-box .subtitle {
      text-align: center;
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }

    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 30px;
    }

    .step {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #e5e7eb;
      transition: all 0.3s ease;
    }

    .step.active {
      background: #ec4899;
      transform: scale(1.2);
    }

    .step.completed {
      background: #10b981;
    }

    .input-box {
      position: relative;
      margin-bottom: 20px;
    }

    .input-box input {
      width: 100%;
      padding: 14px 45px 14px 16px;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      font-size: 15px;
      transition: all 0.3s ease;
      outline: none;
    }

    .input-box input:focus {
      border-color: #ec4899;
      box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
    }

    .input-box i {
      position: absolute;
      right: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 20px;
      color: #9ca3af;
    }

    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #ec4899 0%, #f472b6 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(236, 72, 153, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #6b7280;
      text-decoration: none;
      margin-bottom: 20px;
      font-size: 14px;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: #ec4899;
    }

    .back-link i {
      font-size: 18px;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
    }

    .alert-success {
      background: #d1fae5;
      color: #065f46;
      border: 1px solid #6ee7b7;
    }

    .alert-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .alert-info {
      background: #dbeafe;
      color: #1e40af;
      border: 1px solid #93c5fd;
    }

    .hidden {
      display: none;
    }

    .resend-link {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
    }

    .resend-link a {
      color: #ec4899;
      text-decoration: none;
      font-weight: 500;
    }

    .resend-link a:hover {
      text-decoration: underline;
    }

    .resend-link a:disabled {
      color: #9ca3af;
      cursor: not-allowed;
    }

    .code-inputs {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .code-inputs input {
      width: 50px;
      height: 60px;
      text-align: center;
      font-size: 24px;
      font-weight: 600;
      border: 2px solid #e5e7eb;
      border-radius: 10px;
      outline: none;
      transition: all 0.3s ease;
    }

    .code-inputs input:focus {
      border-color: #ec4899;
      box-shadow: 0 0 0 3px rgba(236, 72, 153, 0.1);
    }

    @media (max-width: 480px) {
      .forgot-box {
        padding: 30px 20px;
      }

      .code-inputs input {
        width: 40px;
        height: 50px;
        font-size: 20px;
      }
    }
  </style>
</head>

<body class="forgot-body">
  <!-- Language Switcher Button -->
  <button onclick="i18n.toggleLanguage()" class="login-back-btn" title="Переключить язык / Tilni o'zgartirish"
    style="position: fixed; top: 20px; right: 20px; left: auto;">
    <span id="lang-flag" class="text-lg">🇷🇺</span>
    <span id="lang-code" class="text-sm">UZ</span>
  </button>

  <div class="forgot-container">
    <div class="forgot-box">
      <a href="/login" class="back-link">
        <i class="bx bx-arrow-back"></i>
        <span data-i18n="auth.back_to_login">Вернуться ко входу</span>
      </a>

      <div class="step-indicator">
        <div class="step active" id="step-1"></div>
        <div class="step" id="step-2"></div>
        <div class="step" id="step-3"></div>
      </div>

      <!-- Шаг 1: Ввод email/телефона -->
      <div id="step-email">
        <h1 data-i18n="auth.forgot_password_title">Восстановление пароля</h1>
        <p class="subtitle" data-i18n="auth.forgot_password_subtitle">Введите ваш email или телефон для восстановления
          пароля</p>

        <form id="email-form">
          <div class="input-box">
            <input type="text" id="email-phone" name="email_phone"
              data-i18n-placeholder="auth.phone_or_email" placeholder="Телефон или Email" required />
            <i class="bx bxs-contact"></i>
          </div>
          <button type="submit" class="btn" data-i18n="auth.reset_password">Сбросить пароль</button>
        </form>
      </div>

      <!-- Шаг 2: Ввод кода -->
      <div id="step-code" class="hidden">
        <h1 data-i18n="auth.enter_code">Введите код</h1>
        <p class="subtitle"><span data-i18n="auth.code_sent">Код отправлен на</span> <span id="contact-display"></span>
        </p>

        <form id="code-form">
          <div class="code-inputs">
            <input type="text" maxlength="1" class="code-digit" inputmode="numeric" pattern="[0-9]*" />
            <input type="text" maxlength="1" class="code-digit" inputmode="numeric" pattern="[0-9]*" />
            <input type="text" maxlength="1" class="code-digit" inputmode="numeric" pattern="[0-9]*" />
            <input type="text" maxlength="1" class="code-digit" inputmode="numeric" pattern="[0-9]*" />
            <input type="text" maxlength="1" class="code-digit" inputmode="numeric" pattern="[0-9]*" />
            <input type="text" maxlength="1" class="code-digit" inputmode="numeric" pattern="[0-9]*" />
          </div>
          <button type="submit" class="btn" data-i18n="auth.verify_code">Проверить код</button>
          <div class="resend-link">
            <a href="#" id="resend-btn" data-i18n="auth.resend_code">Отправить код повторно</a>
          </div>
        </form>
      </div>

      <!-- Шаг 3: Новый пароль -->
      <div id="step-password" class="hidden">
        <h1 data-i18n="auth.enter_new_password">Введите новый пароль</h1>
        <p class="subtitle" data-i18n="auth.new_password">Придумайте надежный пароль</p>

        <form id="password-form">
          <div class="input-box">
            <input type="password" id="new-password" name="new_password"
              data-i18n-placeholder="auth.new_password" placeholder="Новый пароль" required minlength="6" />
            <i class="bx bxs-lock-alt"></i>
          </div>
          <div class="input-box">
            <input type="password" id="confirm-password" name="confirm_password"
              data-i18n-placeholder="auth.confirm_password" placeholder="Подтвердите пароль" required minlength="6" />
            <i class="bx bxs-lock"></i>
          </div>
          <button type="submit" class="btn" data-i18n="auth.reset_password">Сбросить пароль</button>
        </form>
      </div>

      <!-- Шаг успеха -->
      <div id="step-success" class="hidden" style="text-align: center;">
        <i class="bx bx-check-circle" style="font-size: 80px; color: #10b981; margin-bottom: 20px;"></i>
        <h1 data-i18n="auth.password_reset_complete">Пароль успешно изменён</h1>
        <p class="subtitle" style="margin-top: 15px;">Вы можете войти с новым паролем</p>
        <a href="/login" class="btn" style="display: inline-block; text-decoration: none;"
          data-i18n="auth.login_now">Войти</a>
      </div>
    </div>
  </div>

  <script>
    let resetToken = null;
    let contactValue = '';

    // Переключение между шагами
    function showStep(stepNumber) {
      document.querySelectorAll('.step').forEach((step, index) => {
        step.classList.toggle('active', index + 1 === stepNumber);
        step.classList.toggle('completed', index + 1 < stepNumber);
      });

      document.getElementById('step-email').classList.toggle('hidden', stepNumber !== 1);
      document.getElementById('step-code').classList.toggle('hidden', stepNumber !== 2);
      document.getElementById('step-password').classList.toggle('hidden', stepNumber !== 3);
      document.getElementById('step-success').classList.toggle('hidden', stepNumber !== 4);
    }

    // Обработка ввода кода по цифрам
    document.querySelectorAll('.code-digit').forEach((input, index) => {
      input.addEventListener('input', (e) => {
        const value = e.target.value;
        if (value && index < 5) {
          document.querySelectorAll('.code-digit')[index + 1].focus();
        }
      });

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !e.target.value && index > 0) {
          document.querySelectorAll('.code-digit')[index - 1].focus();
        }
      });

      input.addEventListener('paste', (e) => {
        e.preventDefault();
        const pasteData = e.clipboardData.getData('text').slice(0, 6);
        const inputs = document.querySelectorAll('.code-digit');
        pasteData.split('').forEach((char, i) => {
          if (inputs[i]) inputs[i].value = char;
        });
        inputs[Math.min(pasteData.length, 5)].focus();
      });
    });

    // Получение кода из инпутов
    function getCode() {
      return Array.from(document.querySelectorAll('.code-digit'))
        .map(input => input.value)
        .join('');
    }

    // Очистка кода
    function clearCode() {
      document.querySelectorAll('.code-digit').forEach(input => input.value = '');
      document.querySelectorAll('.code-digit')[0].focus();
    }

    // showAlert функция
    function showAlert(container, message, type) {
      const existingAlert = container.querySelector('.alert');
      if (existingAlert) {
        existingAlert.remove();
      }

      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;

      container.insertBefore(alert, container.firstChild);

      setTimeout(() => {
        alert.remove();
      }, 5000);
    }

    // Шаг 1: Отправка email/телефона
    document.getElementById('email-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const contactInput = document.getElementById('email-phone');
      contactValue = contactInput.value.trim();
      const submitBtn = e.target.querySelector('.btn');

      if (!contactValue) {
        showAlert(e.target, 'Введите email или телефон', 'error');
        return;
      }

      const originalText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner" style="display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 1s linear infinite;"></span> ' +
        (i18n.t('common.loading') || 'Отправка...');

      try {
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contact: contactValue }),
        });

        const data = await response.json();

        if (response.ok) {
          resetToken = data.reset_token;
          document.getElementById('contact-display').textContent = contactValue;
          showStep(2);
          clearCode();
          showAlert(document.getElementById('step-code'), 'Код подтверждения отправлен', 'success');
        } else {
          showAlert(e.target, data.detail || 'Ошибка отправки', 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      } catch (error) {
        console.error('Forgot password error:', error);
        showAlert(e.target, 'Ошибка соединения. Проверьте интернет и попробуйте снова.', 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      }
    });

    // Повторная отправка кода
    document.getElementById('resend-btn').addEventListener('click', async (e) => {
      e.preventDefault();

      const resendBtn = e.target;
      const originalText = resendBtn.textContent;
      resendBtn.disabled = true;

      try {
        const response = await fetch('/api/auth/forgot-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ contact: contactValue }),
        });

        const data = await response.json();

        if (response.ok) {
          resetToken = data.reset_token;
          showAlert(document.getElementById('step-code'), 'Код отправлен повторно', 'success');

          // Таймер обратного отсчета
          let seconds = 60;
          resendBtn.textContent = `${seconds} сек.`;
          const timer = setInterval(() => {
            seconds--;
            resendBtn.textContent = `${seconds} сек.`;
            if (seconds <= 0) {
              clearInterval(timer);
              resendBtn.disabled = false;
              resendBtn.textContent = originalText;
            }
          }, 1000);
        } else {
          showAlert(document.getElementById('step-code'), data.detail || 'Ошибка', 'error');
          resendBtn.disabled = false;
        }
      } catch (error) {
        console.error('Resend error:', error);
        showAlert(document.getElementById('step-code'), 'Ошибка соединения', 'error');
        resendBtn.disabled = false;
      }
    });

    // Шаг 2: Проверка кода
    document.getElementById('code-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const code = getCode();
      const submitBtn = e.target.querySelector('.btn');

      if (code.length !== 6) {
        showAlert(e.target, 'Введите 6-значный код', 'error');
        return;
      }

      const originalText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner" style="display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 1s linear infinite;"></span> ' +
        (i18n.t('common.loading') || 'Проверка...');

      try {
        const response = await fetch('/api/auth/verify-reset-code', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            reset_token: resetToken,
            code: code
          }),
        });

        const data = await response.json();

        if (response.ok) {
          showStep(3);
          showAlert(document.getElementById('step-password'), 'Код подтверждён', 'success');
        } else {
          showAlert(e.target, data.detail || 'Неверный код', 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      } catch (error) {
        console.error('Verify code error:', error);
        showAlert(e.target, 'Ошибка соединения', 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      }
    });

    // Шаг 3: Установка нового пароля
    document.getElementById('password-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const newPassword = document.getElementById('new-password').value.trim();
      const confirmPassword = document.getElementById('confirm-password').value.trim();
      const submitBtn = e.target.querySelector('.btn');

      if (newPassword.length < 6) {
        showAlert(e.target, 'Пароль должен быть не менее 6 символов', 'error');
        return;
      }

      if (newPassword !== confirmPassword) {
        showAlert(e.target, 'Пароли не совпадают', 'error');
        return;
      }

      const originalText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner" style="display:inline-block;width:20px;height:20px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 1s linear infinite;"></span> ' +
        (i18n.t('common.loading') || 'Сохранение...');

      try {
        const response = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            reset_token: resetToken,
            new_password: newPassword
          }),
        });

        const data = await response.json();

        if (response.ok) {
          showStep(4);
        } else {
          showAlert(e.target, data.detail || 'Ошибка сброса пароля', 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      } catch (error) {
        console.error('Reset password error:', error);
        showAlert(e.target, 'Ошибка соединения', 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      }
    });

    // Инициализация
    document.addEventListener('DOMContentLoaded', () => {
      if (window.i18n) {
        i18n.init();
      }
      
      // Применяем маску к полю телефона/email
      const contactInput = document.getElementById('email-phone');
      if (contactInput) {
        contactInput.addEventListener('input', function(e) {
          let value = e.target.value;
          
          // Если это email (содержит @), не применяем маску
          if (value.includes('@')) {
            return;
          }
          
          // Применяем маску телефона
          value = value.replace(/\D/g, '');
          
          if (value.length === 0) {
            e.target.value = '';
            return;
          }
          
          if (value.startsWith('998') && value.length > 3) {
            value = '+' + value;
          } else if (value.startsWith('8') && value.length > 1) {
            value = '+998' + value.slice(1);
          } else if (value.startsWith('7') && value.length > 1) {
            value = '+998' + value.slice(1);
          } else if (!value.startsWith('+') && value.length <= 12) {
            value = '+998' + value;
          }
          
          // Форматирование
          if (value.length <= 4) {
            e.target.value = value;
          } else if (value.length <= 6) {
            e.target.value = value.slice(0, 4) + ' ' + value.slice(4);
          } else if (value.length <= 9) {
            e.target.value = value.slice(0, 4) + ' ' + value.slice(4, 6) + ' ' + value.slice(6);
          } else if (value.length <= 11) {
            e.target.value = value.slice(0, 4) + ' ' + value.slice(4, 6) + ' ' + value.slice(6, 9) + ' ' + value.slice(9);
          } else {
            e.target.value = value.slice(0, 4) + ' ' + value.slice(4, 6) + ' ' + value.slice(6, 9) + ' ' + value.slice(9, 11) + ' ' + value.slice(11, 13);
          }
        });
      }
    });
  </script>
</body>

</html>
