<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Вход - UzFlower</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <script src="/static/js/i18n.js"></script>
</head>

<body class="login-body">
  <!-- Language Switcher Button -->
  <button onclick="i18n.toggleLanguage()" class="login-back-btn" title="Переключить язык / Tilni o'zgartirish" style="right: 70px; left: auto;">
    <span id="lang-flag" class="text-lg">🇷🇺</span>
    <span id="lang-code" class="text-sm">UZ</span>
  </button>
  
  <a href="/" class="login-back-btn" title="На главную">
    <i class="bx bx-arrow-back"></i>
    <span>Назад</span>
  </a>
  <div class="container">
    <div class="form-box login">
      <form action="#" autocomplete="on">
        <h1>Войти</h1>
        <div class="input-box">
          <input type="email" name="email" placeholder="Email" required autocomplete="email" />
          <i class="bx bxs-envelope"></i>
        </div>
        <div class="input-box">
          <input type="password" name="password" placeholder="Пароль" required autocomplete="current-password" />
          <i class="bx bxs-lock-alt"></i>
        </div>
        <div class="forgot-link">
          <a href="#">Забыли пароль?</a>
        </div>
        <button type="submit" class="btn">Войти</button>
      </form>
    </div>

    <div class="form-box register">
      <form action="#" autocomplete="on">
        <h1>Регистрация</h1>
        <div class="input-box">
          <input type="text" name="full_name" placeholder="Ваше имя" required autocomplete="name" />
          <i class="bx bxs-user"></i>
        </div>
        <div class="input-box">
          <input type="email" name="email" placeholder="Email" required autocomplete="email" />
          <i class="bx bxs-envelope"></i>
        </div>
        <div class="input-box">
          <input type="password" name="password" placeholder="Пароль (мин. 6 символов)" required minlength="6" autocomplete="new-password" />
          <i class="bx bxs-lock-alt"></i>
        </div>
        <button type="submit" class="btn">Зарегистрироваться</button>
      </form>
    </div>

    <div class="toggle-box">
      <div class="toggle-panel toggle-left">
        <h1 style="color: rgb(50, 33, 33)">Добро пожаловать!</h1>
        <p style="color: rgb(50, 33, 33);">Нет аккаунта?</p>
        <button class="btn register-btn" style="color: rgb(96, 83, 83)">Зарегистрироваться</button>
      </div>

      <div class="toggle-panel toggle-right">
        <h1 style="color: rgb(50, 33, 33)">Добро пожаловать!</h1>
        <p style="color: rgb(50, 33, 33);">У вас уже есть аккаунт?</p>
        <button class="btn login-btn" style="color: rgb(96, 83, 83)">Войти</button>
      </div>
    </div>
  </div>

  <script>
    // Toggle между Login и Register
    const container = document.querySelector('.container');
    const registerBtn = document.querySelector('.register-btn');
    const loginBtn = document.querySelector('.login-btn');

    registerBtn.addEventListener('click', () => {
      container.classList.add('active');
    });

    loginBtn.addEventListener('click', () => {
      container.classList.remove('active');
    });

    function parseApiDetail(detail) {
      if (typeof detail === 'string') return detail;
      if (Array.isArray(detail) && detail.length > 0) {
        const first = detail[0];
        return (first.msg || first.message || JSON.stringify(first));
      }
      return 'Произошла ошибка';
    }

    // Обработка формы входа
    const loginForm = document.querySelector('.form-box.login form');
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const inputs = loginForm.querySelectorAll('input');
      const email = (inputs[0].value || '').trim().toLowerCase();
      const password = (inputs[1].value || '').trim();
      const submitBtn = loginForm.querySelector('.btn');

      if (!email || !password) {
        showAlert(loginForm, 'Введите email и пароль', 'error');
        return;
      }

      const originalText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Вход...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });

        const textData = await response.text();
        let data;
        try {
          data = JSON.parse(textData);
        } catch (e) {
          console.error("Non-JSON response from server:", textData);
          throw new Error(response.ok ? "Неверный ответ сервера" : (textData || "Внутренняя ошибка сервера (500)"));
        }

        if (response.ok) {
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('user', JSON.stringify(data.user));

          if (data.user && data.user.is_admin) {
            window.location.href = '/admin';
          } else {
            window.location.href = '/';
          }
        } else {
          showAlert(loginForm, parseApiDetail(data.detail) || 'Ошибка входа', 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      } catch (error) {
        console.error('Login error:', error);
        showAlert(loginForm, error.message || 'Ошибка соединения. Проверьте интернет и попробуйте снова.', 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      }
    });

    // Обработка формы регистрации
    const registerForm = document.querySelector('.form-box.register form');
    registerForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const inputs = registerForm.querySelectorAll('input');
      const full_name = (inputs[0].value || '').trim();
      const email = (inputs[1].value || '').trim().toLowerCase();
      const password = (inputs[2].value || '').trim();
      const submitBtn = registerForm.querySelector('.btn');

      if (!full_name || !email || !password) {
        showAlert(registerForm, 'Заполните имя, email и пароль', 'error');
        return;
      }
      if (password.length < 6) {
        showAlert(registerForm, 'Пароль должен быть не менее 6 символов', 'error');
        return;
      }

      const originalText = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner"></span> Регистрация...';

      try {
        const response = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password, full_name }),
        });

        const textData = await response.text();
        let data;
        try {
          data = JSON.parse(textData);
        } catch (e) {
          console.error("Non-JSON response from server:", textData);
          throw new Error(response.ok ? "Неверный ответ сервера" : (textData || "Внутренняя ошибка сервера (500)"));
        }

        if (response.ok) {
          showAlert(registerForm, 'Аккаунт создан! Теперь войдите.', 'success');
          container.classList.remove('active');
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        } else {
          const msg = parseApiDetail(data.detail) || 'Ошибка регистрации';
          showAlert(registerForm, msg === 'Email already registered' ? 'Этот email уже зарегистрирован' : msg, 'error');
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      } catch (error) {
        console.error('Register error:', error);
        showAlert(registerForm, error.message || 'Ошибка соединения. Проверьте интернет и попробуйте снова.', 'error');
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
      }
    });

    // Функция показа уведомлений
    function showAlert(form, message, type) {
      // Удаляем существующие алерты
      const existingAlert = form.querySelector('.alert');
      if (existingAlert) {
        existingAlert.remove();
      }

      const alert = document.createElement('div');
      alert.className = `alert alert-${type}`;
      alert.textContent = message;

      // Вставляем перед первым элементом формы
      form.insertBefore(alert, form.firstChild);

      // Автоматически скрываем через 5 секунд
      setTimeout(() => {
        alert.remove();
      }, 5000);
    }

    // Проверка авторизации при загрузке
    document.addEventListener('DOMContentLoaded', () => {
      // Инициализация системы переводов
      if (window.i18n) {
        i18n.init();
      }

      const token = localStorage.getItem('token');
      const user = localStorage.getItem('user');

      if (token && user) {
        try {
          const userData = JSON.parse(user);
          if (userData.is_admin) {
            window.location.href = '/admin';
          } else {
            window.location.href = '/';
          }
        } catch (e) {
          localStorage.removeItem('token');
          localStorage.removeItem('user');
        }
      }
    });
  </script>
</body>

</html>
