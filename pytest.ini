[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
python_classes = Test*
addopts = -v --tb=short --strict-markers -ra
markers =
    unit
    integration
    api
    slow
norecursedirs = .git .venv __pycache__ .pytest_cache htmlcov .mypy_cache .ruff_cache
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
