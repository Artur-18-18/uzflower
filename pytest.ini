[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
addopts = 
    -v
    --tb=short
    --strict-markers
    # Coverage reporting is enabled in CI workflows explicitly.
    # Keep pytest.ini free of --cov options so local environments without
    # pytest-cov won't fail with "unrecognized arguments".
markers =
    unit: Unit tests
    integration: Integration tests
    auth: Authentication tests
    user: User tests
    product: Product tests
    order: Order tests
    review: Review tests
    admin: Admin only tests
